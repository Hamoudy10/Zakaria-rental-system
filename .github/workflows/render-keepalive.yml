name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_HEALTHCHECK_URL" ]; then
            echo "Missing GitHub secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi

          echo "Pinging Render at $(date -u)"
          HTTP_CODE=$(curl --silent --show-error \
            --write-out "%{http_code}" \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            "$RENDER_HEALTHCHECK_URL" 2>&1 | tail -1)

          echo "Response HTTP code: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Server is awake and healthy"
          else
            echo "⚠️ Server returned HTTP $HTTP_CODE — may be starting up or unhealthy"
          fi
